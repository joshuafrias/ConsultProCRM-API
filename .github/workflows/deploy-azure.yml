name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME || secrets.AZURE_WEBAPP_NAME }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || secrets.AZURE_RESOURCE_GROUP }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Azure config
        run: |
          if [ -z "$AZURE_WEBAPP_NAME" ]; then
            echo "AZURE_WEBAPP_NAME is not set. Add it as a repository variable or secret."
            exit 1
          fi
          if [ -z "$AZURE_RESOURCE_GROUP" ]; then
            echo "AZURE_RESOURCE_GROUP is not set. Add it as a repository variable or secret."
            exit 1
          fi
          echo "Deploying to Azure Web App: $AZURE_WEBAPP_NAME"
          echo "Using resource group: $AZURE_RESOURCE_GROUP"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v4
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .

      - name: Configure app settings
        run: |
          az webapp config appsettings set \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --settings \
            BASE44_APP_ID="${{ secrets.BASE44_APP_ID }}" \
            BASE44_API_KEY="${{ secrets.BASE44_API_KEY }}" \
            INBOUND_API_KEY="${{ secrets.INBOUND_API_KEY }}" \
            SCM_DO_BUILD_DURING_DEPLOYMENT=true \
            ENABLE_ORYX_BUILD=true \
            NODE_ENV=production \
            PORT=8080
