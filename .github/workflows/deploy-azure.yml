name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME || secrets.AZURE_WEBAPP_NAME }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Azure app name
        run: |
          if [ -z "$AZURE_WEBAPP_NAME" ]; then
            echo "AZURE_WEBAPP_NAME is not set. Add it as a repository variable or secret."
            exit 1
          fi
          echo "Deploying to Azure Web App: $AZURE_WEBAPP_NAME"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .

      - name: Configure app settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              { "name": "BASE44_APP_ID", "value": "${{ secrets.BASE44_APP_ID }}", "slotSetting": false },
              { "name": "BASE44_API_KEY", "value": "${{ secrets.BASE44_API_KEY }}", "slotSetting": false },
              { "name": "INBOUND_API_KEY", "value": "${{ secrets.INBOUND_API_KEY }}", "slotSetting": false },
              { "name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "true", "slotSetting": false },
              { "name": "ENABLE_ORYX_BUILD", "value": "true", "slotSetting": false },
              { "name": "NODE_ENV", "value": "production", "slotSetting": false },
              { "name": "PORT", "value": "8080", "slotSetting": false }
            ]
